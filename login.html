<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - TuFlete</title>

<link rel="stylesheet" href="tuFlete.css">

</head>
<body>

    <a href="tuFlete.html" class="logo-link">
    <img src="tuFlete.png" alt="TuFlete" class="logo">
</a>

<div class="form-container">

    <h1>Iniciar Sesión</h1>

    <form id="loginForm">

        <input
        type="email"
        id="correo"
        placeholder="Correo"
        required>

        <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required>

        <button type="submit">
            Entrar
        </button>

    </form>

</div>



<script src="login.js"></script>

</body>
</html>
