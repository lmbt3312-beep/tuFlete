<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - TuFlete</title>

<link rel="stylesheet" href="tuFlete.css">

</head>
<body>

    <a href="tuFlete.html" class="logo-link">
    <img src="tuFlete.png" alt="TuFlete" class="logo">
</a>

<div class="form-container">

    <h1>Crear Cuenta</h1>

    <form id="registroForm">

        <input
        type="text"
        id="nombre"
        placeholder="Nombre Completo"
        required>

        <input
        type="email"
        id="correo"
        placeholder="Correo Electrónico"
        required>

        <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required>

        <button type="submit">
            Registrarme
        </button>

    </form>

    <p>
        ¿Ya tienes cuenta?
        <a href="login.html">Iniciar Sesión</a>
    </p>

</div>

<script src="registro.js"></script>

</body>
</html>
